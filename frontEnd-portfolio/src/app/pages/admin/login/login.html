<div class="container d-flex justify-content-center align-items-center flex-column vh-100 w-100">
    <div class="row">
        <div class="col-6 w-100 mb-5">
            <h1>Admin Login</h1>
        </div>
    </div>
    <div class="row">
        <div class="col-6 w-100">
            <form #loginForm="ngForm" (submit)="submitForm(loginForm)">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" ngModel name="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" ngModel name="email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" ngModel name="password">
                </div>
                <input type="submit" class="btn btn-primary" value="Submit"/>
            </form>
        </div>
    </div>
</div>
